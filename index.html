<script>
  const btn = document.getElementById("whatsappBtn");

  const mensajeFrio = "https://wa.me/56948590700?text=Hola%2C%20vi%20tu%20p%C3%A1gina%20y%20me%20interesa%20conversar.";
  const mensajeCaliente = "https://wa.me/56948590700?text=Hola%2C%20tengo%20una%20propiedad%20y%20me%20gustar%C3%ADa%20evaluarla.";

  let estado = "frio";
  let tiempoInicio = Date.now();

  btn.href = mensajeFrio;

  function activarCaliente() {
    if (estado !== "caliente") {
      estado = "caliente";
      btn.href = mensajeCaliente;
    }
  }

  function detectarInteraccion() {
    const tiempoActual = Date.now();
    const tiempoEnPagina = tiempoActual - tiempoInicio;

    // SOLO si ya pasaron 3 segundos
    if (tiempoEnPagina > 3000) {
      activarCaliente();
    }
  }

  document.addEventListener("mousemove", detectarInteraccion);
  document.addEventListener("scroll", detectarInteraccion);
  document.addEventListener("touchstart", detectarInteraccion);

  // respaldo por tiempo largo
  setTimeout(() => {
    activarCaliente();
  }, 7000);

</script>
