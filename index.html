<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WELLGRID</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300&family=DM+Serif+Display&display=swap" rel="stylesheet">

  <script>
    function trackClick() {
      console.log("CLICK CONTACTO");

      if (typeof gtag !== "undefined") {
        gtag('event', 'click_whatsapp', {
          event_category: 'contacto',
          event_label: 'boton_principal'
        });
      }
    }
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      color: #111;
    }

    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: url('fondo.png');
      background-size: cover;
      background-position: center;
      animation: zoom 28s ease infinite alternate;
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.20),
        rgba(0,0,0,0.75)
      );
    }

    .container {
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
      padding-left: 10%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .text-block {
      max-width: 420px;
      opacity: 0;
      animation: cinematic 2s ease forwards;
      animation-delay: 0.8s;
    }

    .small {
      font-weight: 200;
      letter-spacing: 4px;
      font-size: 12px;
      opacity: 0.8;
    }

    .italic {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 26px;
      margin-top: 25px;
    }

    .location {
      margin-top: 6px;
      font-size: 11px;
      letter-spacing: 3px;
      opacity: 0.7;
    }

    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 64px;
      margin-top: 30px;
    }

    .button {
      display: inline-block;
      margin-top: 60px;
      padding: 16px 46px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2.8px;
      color: white;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(12px);
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: cinematic 2s ease forwards;
      animation-delay: 1.8s;
    }

    .button:hover {
      background: rgba(0,0,0,0.85);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .button::after {
      content: "";
      position: absolute;
      width: 120%;
      height: 100%;
      top: 0;
      left: -120%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.25),
        transparent
      );
      transition: all 0.6s ease;
    }

    .button:hover::after {
      left: 120%;
    }

    .micro {
      margin-top: 30px;
      font-size: 10px;
      letter-spacing: 3px;
      opacity: 0.35;
    }

    @keyframes cinematic {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.98);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    @media (max-width: 768px) {

      .container {
        padding: 0 6%;
        align-items: flex-end;
        padding-bottom: 12%;
      }

      .name {
        font-size: 46px;
      }

      .italic {
        font-size: 20px;
      }

      .button {
        width: 100%;
        text-align: center;
        padding: 18px;
        font-size: 13px;
      }
    }

  </style>
</head>

<body>

  <div class="background"></div>
  <div class="overlay"></div>

  <div class="container">
    <div class="text-block">

      <div class="small">REAL ESTATE · ADVISORY</div>

      <div class="italic">Broker Residencial</div>
      <div class="location">LO BARNECHEA · LA DEHESA</div>

      <div class="name">JPRL</div>

      <a class="button" 
         href="https://wa.me/56948590700?text=Hola%2C%20tengo%20una%20propiedad%20y%20me%20gustar%C3%ADa%20evaluarla"
         target="_blank"
         onclick="trackClick()">
        CONTACTO DIRECTO
      </a>

      <div class="micro">PRIVATE BROKERAGE</div>

    </div>
  </div>

</body>
</html>
